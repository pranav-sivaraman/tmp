on: [push]

jobs:
  build-compilers:
    runs-on: ubuntu-22.04
    name: Build Compilers
    permissions:
      packages: write

    steps:

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Spack
        uses: actions/checkout@v4
        with:
          repository: spack/spack
          ref: develop
          path: spack

      - name: Run Build
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: x86_64
          base_image: quay.io/pypa/manylinux2014_x86_64

          githubToken: $ {{ github.token }}

          env: |
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            BASE_IMAGE: quay.io/pypa/manylinux2014_x86_64

          run: |
            # Spack environment variables
            export PATH=$PATH:$(pwd)/spack/bin
            export SPACK_COLOR=always
            export SPACK_DISABLE_LOCAL_CONFIG=1
            export SPACK_PYTHON=/opt/python/cp312-cp312/bin/python

            # Find compilers
            spack -e compiler find --mixed-toolchain

            # Login
            spack -e . mirror set --oci-username $GITHUB_ACTOR --oci-password $GITHUB_TOKEN local-buildcache

            # Concretize
            spack -e . v concretize

            # Spack Install 
            spack -e . install --no-check-signature

            # Push packages and update index
            spack -e . buildcache push --base-image $BASE_IMAGE --update-index local-buildcache

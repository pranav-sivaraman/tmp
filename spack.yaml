spack:
  specs:
  - mold
  view: false
  concretizer:
    unify: true
    targets:
      granularity: generic
  config:
    install_tree:
      root: /opt/spack
      padded_length: 128
    ccache: true
  mirrors:
    local-buildcache:
      url: oci://ghcr.io/pranav-sivaraman/tmp
      signed: false
  packages:
    all:
      variants:
      - generator=make

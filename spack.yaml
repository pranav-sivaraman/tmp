spack:
  specs:
  - mold
  - hwloc +rocm amdgpu_target=gfx90a
  view: false
  concretizer:
    unify: false
    targets:
      granularity: generic
  config:
    install_tree:
      root: /opt/spack
      padded_length: 128
  mirrors:
    local-buildcache:
      url: oci://ghcr.io/pranav-sivaraman/tmp
      signed: false
  packages:
    all:
      variants:
      - generator=make
  repos:
  - ./tmp
